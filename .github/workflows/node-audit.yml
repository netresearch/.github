name: Node.js Dependency Audit

on:
  workflow_call:
    inputs:
      audit-level:
        description: 'Minimum severity to fail on (low, moderate, high, critical)'
        required: false
        type: string
        default: 'high'
      package-manager:
        description: 'Package manager to use (npm, pnpm, yarn, bun)'
        required: false
        type: string
        default: 'npm'
      node-version:
        description: 'Node.js version (e.g. 22, lts/*). Used when node-version-file is empty.'
        required: false
        type: string
        default: 'lts/*'
      node-version-file:
        description: 'Node version file (e.g. .nvmrc, .node-version, package.json). Takes precedence over node-version when non-empty.'
        required: false
        type: string
        default: ''
      pnpm-version:
        description: 'pnpm version (only used when package-manager is pnpm and packageManager is not set in package.json)'
        required: false
        type: string
        default: 'latest'

permissions: {}

jobs:
  node-audit:
    name: Node.js Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect packageManager field
        id: detect-pm
        if: inputs.package-manager == 'pnpm'
        run: |
          if grep -q '"packageManager"' package.json 2>/dev/null; then
            echo "has_package_manager=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_manager=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm (from packageManager field)
        if: inputs.package-manager == 'pnpm' && steps.detect-pm.outputs.has_package_manager == 'true'
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - name: Setup pnpm (explicit version)
        if: inputs.package-manager == 'pnpm' && steps.detect-pm.outputs.has_package_manager != 'true'
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Bun
        if: inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Enable Corepack
        if: inputs.package-manager == 'yarn'
        run: corepack enable

      - name: Setup Node (from version file)
        if: inputs.node-version-file != ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ${{ inputs.node-version-file }}

      - name: Setup Node (explicit version)
        if: inputs.node-version-file == ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Run audit (bun)
        if: inputs.package-manager == 'bun'
        run: |
          bun install --frozen-lockfile
          npm i --package-lock-only
          npm audit --audit-level=${{ inputs.audit-level }}

      - name: Run audit (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: pnpm audit --audit-level=${{ inputs.audit-level }}

      - name: Run audit (npm)
        if: inputs.package-manager == 'npm'
        run: npm audit --audit-level=${{ inputs.audit-level }}

      - name: Run audit (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn npm audit --severity ${{ inputs.audit-level }}
