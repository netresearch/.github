name: Node.js Dependency Audit

on:
  workflow_call:
    inputs:
      audit-level:
        description: 'Minimum severity to fail on (low, moderate, high, critical)'
        required: false
        type: string
        default: 'high'
      package-manager:
        description: 'Package manager to use (npm, pnpm, yarn)'
        required: false
        type: string
        default: 'pnpm'
      node-version-file:
        description: 'Node version file (e.g. .nvmrc, .node-version, package.json)'
        required: false
        type: string
        default: '.nvmrc'
      pnpm-version:
        description: 'pnpm version (only used when package-manager is pnpm and packageManager is not set in package.json)'
        required: false
        type: string
        default: 'latest'

permissions: {}

jobs:
  node-audit:
    name: Node.js Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ${{ inputs.node-version-file }}

      - name: Run audit (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: pnpm audit --audit-level=${{ inputs.audit-level }}

      - name: Run audit (npm)
        if: inputs.package-manager == 'npm'
        run: npm audit --audit-level=${{ inputs.audit-level }}

      - name: Run audit (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn npm audit --severity ${{ inputs.audit-level }}
