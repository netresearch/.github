# Reusable "GHCR retention" workflow — prunes old container image versions
# from ghcr.io for a given package using a configurable retention policy.
#
# Strategy (generalized from the ofelia inline workflow):
# - Release images (matching release-tag-patterns, default v*, latest*) are
#   kept FOREVER.
# - Edge images (matching edge-tag-patterns, default edge*) older than
#   edge-max-age-days are deleted.
# - Orphaned untagged images (not referenced by any tagged manifest) older
#   than orphan-max-age-days are deleted.
# - Untagged images referenced by a tagged manifest (attestations,
#   provenance, sbom, platform manifests inside a manifest-list) are
#   preserved regardless of age.
#
# Multi-arch builds typically create multiple versions per release:
#   - N platform images (386, amd64, arm/v6, arm/v7, arm64 — usually tagged,
#     e.g. v1.2.3-amd64, edge-amd64)
#   - 2 attestation images (provenance, sbom — untagged but referenced)
# The referenced-digest scan keeps attestations alive for as long as any
# tagged manifest still points at them.
#
# See: https://github.com/actions/delete-package-versions/issues/162
#
# Caller pattern:
#
#   name: GHCR Retention
#   on:
#     schedule:
#       - cron: "0 2 * * 0"   # weekly, Sundays 02:00 UTC
#     workflow_dispatch:
#       inputs:
#         dry-run:
#           type: boolean
#           default: true
#   jobs:
#     prune:
#       uses: netresearch/.github/.github/workflows/ghcr-retention.yml@main
#       with:
#         package-name: my-app
#         dry-run: ${{ inputs.dry-run || false }}
#
# SECURITY: every caller-supplied input that lands in a `run:` step is
# pushed through the `env:` block so it cannot break out of its argument
# position via quoting/metacharacters.

name: GHCR Retention (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: "GHCR package name to prune (e.g. 'my-app'). The owner is taken from github.repository_owner."
        required: true
        type: string
      release-tag-patterns:
        description: "Comma-separated glob patterns; images whose tags match any of these are kept forever."
        required: false
        type: string
        default: "v*,latest*"
      edge-tag-patterns:
        description: "Comma-separated glob patterns; images whose tags match any of these are pruned once older than edge-max-age-days."
        required: false
        type: string
        default: "edge*"
      edge-max-age-days:
        description: "Delete edge-pattern images older than this many days."
        required: false
        type: number
        default: 30
      orphan-max-age-days:
        description: "Delete orphaned untagged images older than this many days."
        required: false
        type: number
        default: 7
      dry-run:
        description: "If true, list what would be deleted but don't delete."
        required: false
        type: boolean
        default: false

jobs:
  cleanup-edge-images:
    name: Cleanup Old Edge Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Cleanup old edge container versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          RELEASE_TAG_PATTERNS: ${{ inputs.release-tag-patterns }}
          EDGE_TAG_PATTERNS: ${{ inputs.edge-tag-patterns }}
          EDGE_MAX_AGE_DAYS: ${{ inputs.edge-max-age-days }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail

          echo "Fetching container versions for ${PACKAGE_NAME} (owner: ${OWNER})..."
          echo "Edge retention: ${EDGE_MAX_AGE_DAYS} days"
          echo "Release tag patterns (kept forever): ${RELEASE_TAG_PATTERNS}"
          echo "Edge tag patterns (pruned): ${EDGE_TAG_PATTERNS}"
          echo "Dry run: ${DRY_RUN}"
          echo ""

          # Convert comma-separated glob patterns (e.g. "v*,latest*") to a
          # jq array of regex patterns (e.g. ["^v.*$", "^latest.*$"]). Globs
          # are intentionally minimal: "*" -> ".*", everything else is treated
          # as a literal anchored match.
          glob_list_to_regex_array() {
            local list="$1"
            echo "$list" | jq -Rc '
              split(",")
              | map(gsub("^\\s+|\\s+$"; ""))
              | map(select(length > 0))
              | map("^" + (gsub("\\*"; ".*")) + "$")
            '
          }

          RELEASE_REGEX_JSON=$(glob_list_to_regex_array "$RELEASE_TAG_PATTERNS")
          EDGE_REGEX_JSON=$(glob_list_to_regex_array "$EDGE_TAG_PATTERNS")
          echo "Compiled release regex: ${RELEASE_REGEX_JSON}"
          echo "Compiled edge regex:    ${EDGE_REGEX_JSON}"
          echo ""

          # Calculate cutoff date
          CUTOFF_DATE=$(date -d "-${EDGE_MAX_AGE_DAYS} days" -Iseconds)
          echo "Cutoff date: ${CUTOFF_DATE}"
          echo ""

          # Get all versions (paginated)
          PAGE=1
          VERSIONS_TO_DELETE=()

          while true; do
            VERSIONS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100&page=${PAGE}" 2>/dev/null || echo "[]")

            # Check if we got any versions
            COUNT=$(echo "$VERSIONS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            echo "Processing page ${PAGE} (${COUNT} versions)..."

            # Process each version
            while IFS= read -r version; do
              VERSION_ID=$(echo "$version" | jq -r '.id')
              CREATED_AT=$(echo "$version" | jq -r '.created_at')
              TAGS=$(echo "$version" | jq -r '.metadata.container.tags // [] | join(", ")')

              # Skip if no tags — these are likely attestations referenced by
              # manifests and are handled by the orphan-cleanup job.
              if [ -z "$TAGS" ]; then
                continue
              fi

              # Check if ANY tag matches a release pattern (kept forever)
              HAS_RELEASE_TAG=$(echo "$version" | jq -r --argjson patterns "$RELEASE_REGEX_JSON" '
                .metadata.container.tags // []
                | any(.[]; . as $t | any($patterns[]; . as $p | $t | test($p)))
              ')

              if [ "$HAS_RELEASE_TAG" = "true" ]; then
                continue
              fi

              # Check if this is an edge-pattern image
              IS_EDGE=$(echo "$version" | jq -r --argjson patterns "$EDGE_REGEX_JSON" '
                .metadata.container.tags // []
                | any(.[]; . as $t | any($patterns[]; . as $p | $t | test($p)))
              ')

              if [ "$IS_EDGE" != "true" ]; then
                continue
              fi

              # Check if older than cutoff
              if [[ "$CREATED_AT" < "$CUTOFF_DATE" ]]; then
                echo "  Version ${VERSION_ID} (tags: ${TAGS}) created ${CREATED_AT} - WILL DELETE"
                VERSIONS_TO_DELETE+=("$VERSION_ID")
              fi
            done < <(echo "$VERSIONS" | jq -c '.[]')

            PAGE=$((PAGE + 1))
          done

          echo ""
          echo "Summary: ${#VERSIONS_TO_DELETE[@]} edge versions to delete"
          echo ""

          if [ ${#VERSIONS_TO_DELETE[@]} -eq 0 ]; then
            echo "No old edge images to clean up"
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN - Would delete ${#VERSIONS_TO_DELETE[@]} versions"
            echo "Run with dry-run=false to actually delete"
            exit 0
          fi

          # Delete the versions
          DELETED=0
          FAILED=0
          for VERSION_ID in "${VERSIONS_TO_DELETE[@]}"; do
            echo "Deleting version ${VERSION_ID}..."
            if gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}" 2>/dev/null; then
              DELETED=$((DELETED + 1))
            else
              echo "  WARNING: Failed to delete version ${VERSION_ID}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "Deleted ${DELETED} versions"
          if [ $FAILED -gt 0 ]; then
            echo "WARNING: Failed to delete ${FAILED} versions"
          fi

  cleanup-orphaned-images:
    name: Cleanup Orphaned Untagged Images
    runs-on: ubuntu-latest
    needs: cleanup-edge-images
    permissions:
      packages: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Install crane
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5
        with:
          # Pin crane to a known-good release; `latest` broke CI in the past
          # when upstream re-tagged without backward compat.
          version: v0.22.1

      - name: Log in to Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup orphaned untagged images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          ORPHAN_MAX_AGE_DAYS: ${{ inputs.orphan-max-age-days }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail

          # Lowercase the owner for the registry path (ghcr.io requires lowercase)
          OWNER_LC="${OWNER,,}"
          IMAGE="ghcr.io/${OWNER_LC}/${PACKAGE_NAME}"

          echo "Collecting referenced digests from all tagged manifests..."
          echo "Image: ${IMAGE}"
          echo "Orphan retention: ${ORPHAN_MAX_AGE_DAYS} days"
          echo "Dry run: ${DRY_RUN}"
          echo ""

          # Calculate cutoff date
          CUTOFF_DATE=$(date -d "-${ORPHAN_MAX_AGE_DAYS} days" -Iseconds)
          echo "Cutoff date: ${CUTOFF_DATE}"
          echo ""

          # Collect all referenced digests from tagged manifests
          REFERENCED_DIGESTS=$(mktemp)
          TAGS=$(crane ls "$IMAGE" 2>/dev/null || echo "")

          if [ -z "$TAGS" ]; then
            echo "No tags found, skipping"
            exit 0
          fi

          TAG_COUNT=$(echo "$TAGS" | wc -l)
          echo "Found ${TAG_COUNT} tags, collecting referenced digests..."

          for TAG in $TAGS; do
            # Get manifest and extract all referenced digests
            MANIFEST=$(crane manifest "${IMAGE}:${TAG}" 2>/dev/null || echo "{}")

            # Extract digests from manifest list (multi-arch) or single manifest
            echo "$MANIFEST" | jq -r '
              # From manifest list
              (.manifests[]?.digest // empty),
              # From config
              (.config?.digest // empty),
              # From layers
              (.layers[]?.digest // empty)
            ' 2>/dev/null >> "$REFERENCED_DIGESTS" || true
          done

          # Sort and dedupe
          sort -u "$REFERENCED_DIGESTS" -o "$REFERENCED_DIGESTS"
          REF_COUNT=$(wc -l < "$REFERENCED_DIGESTS")
          echo "Found ${REF_COUNT} unique referenced digests"
          echo ""

          # Now find orphaned untagged versions
          echo "Scanning for orphaned untagged versions..."
          PAGE=1
          VERSIONS_TO_DELETE=()

          while true; do
            VERSIONS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100&page=${PAGE}" 2>/dev/null || echo "[]")

            COUNT=$(echo "$VERSIONS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            echo "Processing page ${PAGE} (${COUNT} versions)..."

            while IFS= read -r version; do
              VERSION_ID=$(echo "$version" | jq -r '.id')
              CREATED_AT=$(echo "$version" | jq -r '.created_at')
              VERSION_TAGS=$(echo "$version" | jq -r '.metadata.container.tags // [] | join(", ")')
              DIGEST=$(echo "$version" | jq -r '.name')

              # Only process untagged versions
              if [ -n "$VERSION_TAGS" ]; then
                continue
              fi

              # Check if older than cutoff
              if [[ ! "$CREATED_AT" < "$CUTOFF_DATE" ]]; then
                continue
              fi

              # Check if referenced by any manifest — these are typically
              # attestations (provenance, sbom) or platform manifests inside
              # a manifest list and must be preserved.
              if grep -qF "$DIGEST" "$REFERENCED_DIGESTS" 2>/dev/null; then
                continue
              fi

              echo "  Orphaned: ${VERSION_ID} (${DIGEST}) created ${CREATED_AT}"
              VERSIONS_TO_DELETE+=("$VERSION_ID")
            done < <(echo "$VERSIONS" | jq -c '.[]')

            PAGE=$((PAGE + 1))
          done

          rm -f "$REFERENCED_DIGESTS"

          echo ""
          echo "Summary: ${#VERSIONS_TO_DELETE[@]} orphaned untagged versions to delete"
          echo ""

          if [ ${#VERSIONS_TO_DELETE[@]} -eq 0 ]; then
            echo "No orphaned images to clean up"
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN - Would delete ${#VERSIONS_TO_DELETE[@]} versions"
            echo "Run with dry-run=false to actually delete"
            exit 0
          fi

          # Delete the versions
          DELETED=0
          FAILED=0
          for VERSION_ID in "${VERSIONS_TO_DELETE[@]}"; do
            echo "Deleting version ${VERSION_ID}..."
            if gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}" 2>/dev/null; then
              DELETED=$((DELETED + 1))
            else
              echo "  WARNING: Failed to delete version ${VERSION_ID}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "Deleted ${DELETED} orphaned versions"
          if [ $FAILED -gt 0 ]; then
            echo "WARNING: Failed to delete ${FAILED} versions"
          fi
