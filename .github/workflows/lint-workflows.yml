# Reusable "Lint Workflows" — runs actionlint against the caller's
# `.github/workflows/` directory.
#
# Caller pattern:
#
#   jobs:
#     workflows:
#       uses: netresearch/.github/.github/workflows/lint-workflows.yml@main
#
# SECURITY: pinned action SHAs, harden-runner, read-only permissions,
# `persist-credentials: false` on checkout.

name: Lint Workflows (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Per-job timeout in minutes."
        type: number
        default: 5

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
