name: Create Go Library Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g., v1.10.0). Defaults to the triggering ref name."
        required: false
        type: string
        default: ""
      draft:
        description: "Create as draft release (recommended: true)"
        required: false
        type: boolean
        default: true
      generate-sbom:
        description: "Generate SBOM artifacts"
        required: false
        type: boolean
        default: true
      cosign-sign:
        description: "Sign checksums with Cosign (keyless / Sigstore)"
        required: false
        type: boolean
        default: true
      attest:
        description: "Generate GitHub artifact attestation for release assets"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -v ./...

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is annotated
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          TAG_TYPE=$(git cat-file -t "$TAG")
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "::error::Tag $TAG is lightweight (type: $TAG_TYPE). Only annotated/signed tags are allowed for releases."
            exit 1
          fi
          echo "Tag $TAG is annotated (type: $TAG_TYPE)"

          # Attempt signature verification (informational)
          if git tag -v "$TAG" 2>/dev/null; then
            echo "Tag signature verified"
          else
            echo "::warning::Tag $TAG signature could not be verified (signing key not available in CI)"
          fi

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          DELIMITER="ghadelim_$(openssl rand -hex 8)"

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            {
              echo "notes<<$DELIMITER"
              echo "Initial release"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<$DELIMITER"
              git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}"
              echo ""
              echo ""
              echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG}"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: inputs.generate-sbom
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Generate SBOM (CycloneDX)
        if: inputs.generate-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-${{ steps.tag.outputs.version }}.cyclonedx.json

      - name: Generate SBOM (SPDX)
        if: inputs.generate-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom-${{ steps.tag.outputs.version }}.spdx.json

      - name: Generate checksums
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Checksum all release artifacts that exist
          FILES=""
          for f in sbom-*.json; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -n "$FILES" ]; then
            sha256sum $FILES > checksums.txt
            cat checksums.txt
          else
            echo "No artifacts to checksum"
            touch checksums.txt
          fi

      - name: Install Cosign
        if: inputs.cosign-sign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign checksums with Cosign (keyless)
        if: inputs.cosign-sign
        run: |
          cosign sign-blob --yes \
            --output-certificate checksums.txt.pem \
            --output-signature checksums.txt.sig \
            checksums.txt

      - name: Verify Cosign signature
        if: inputs.cosign-sign
        run: |
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature checksums.txt.sig \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            checksums.txt

      - name: Generate attestation for release artifacts
        if: inputs.attest
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: |
            sbom-*.json
            checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-alpha') || contains(steps.tag.outputs.tag, '-beta') }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            sbom-*.json
            checksums.txt
            checksums.txt.sig
            checksums.txt.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
