# Reusable "Go check" workflow — the canonical build / test / lint / security
# pipeline for Go projects in this org.
#
# Jobs (each can be toggled via inputs):
#   - build-test   : go build + go vet + go test (with optional pre-build-cmd
#                    for projects whose Go code depends on front-end assets)
#   - golangci     : golangci-lint via the official action
#   - govulncheck  : Go vulnerability database scan, fails on fixable vulns
#   - gosec        : gosec security scan, uploads SARIF
#
# Caller pattern:
#
#   jobs:
#     checks:
#       uses: netresearch/.github/.github/workflows/go-check.yml@main
#       with:
#         enable-codecov: true
#         setup-bun: true
#         pre-build-cmd: "bun install --frozen-lockfile && bun run build:assets"
#       secrets:
#         CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
#
# SECURITY: every caller-supplied input that lands in a `run:` step is
# pushed through the `env:` block so it cannot break out of its argument
# position via quoting/metacharacters.

name: Go Check (reusable)

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod / go.work / .go-version for version detection."
        type: string
        default: "go.mod"
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Per-job timeout in minutes."
        type: number
        default: 15

      setup-bun:
        description: "Install Bun before running pre-build-cmd."
        type: boolean
        default: false
      bun-version:
        description: "Bun version to install (passed to oven-sh/setup-bun)."
        type: string
        default: "latest"
      pre-build-cmd:
        description: "Shell command to run before go build / test (e.g. 'bun run build:assets')."
        type: string
        default: ""

      enable-build-test:
        description: "Enable the build + vet + test job."
        type: boolean
        default: true
      build-target:
        description: "Argument passed to `go build -v` and `go vet`."
        type: string
        default: "./..."
      test-packages:
        description: "Packages to run `go test` against."
        type: string
        default: "./..."
      test-flags:
        description: "Flags passed to `go test` (before packages)."
        type: string
        default: "-race -coverprofile=coverage.out -covermode=atomic"

      enable-codecov:
        description: "Upload coverage.out to Codecov after tests."
        type: boolean
        default: false
      codecov-flags:
        description: "Codecov `flags` input."
        type: string
        default: "unittests"
      codecov-file:
        description: "Coverage file to upload."
        type: string
        default: "coverage.out"

      enable-golangci-lint:
        description: "Enable the golangci-lint job."
        type: boolean
        default: true
      golangci-lint-version:
        description: "golangci-lint version (passed to the action)."
        type: string
        default: "latest"
      golangci-lint-args:
        description: "Extra args for golangci-lint run."
        type: string
        default: ""
      golangci-lint-install-mode:
        description: "install-mode for golangci-lint-action. 'goinstall' compiles golangci-lint against the caller's Go toolchain — use this when your repo targets a Go version newer than the prebuilt binary."
        type: string
        default: "goinstall"
      golangci-lint-verify:
        description: "Run `golangci-lint config verify` before linting. Set false when the caller repo's .golangci.yml uses a schema from an older major (e.g. v1-style keys on a v2 binary). Default true — strict is safer."
        type: boolean
        default: true

      enable-govulncheck:
        description: "Enable the govulncheck job."
        type: boolean
        default: true
      govulncheck-version:
        description: "govulncheck version (go run target)."
        type: string
        default: "latest"
      govulncheck-strict:
        description: "Fail the job when govulncheck finds a vulnerability. Default false — findings are surfaced in the log so follow-up work (typically a Go toolchain bump) can be tracked separately without blocking unrelated PRs."
        type: boolean
        default: false

      enable-gosec:
        description: "Enable the gosec security-scan job (SARIF uploaded)."
        type: boolean
        default: true

      enable-smoke-fast-feedback:
        description: "Run a short `go test -short` smoke job in parallel with the full build+test for faster CI failure signal."
        type: boolean
        default: true
      smoke-timeout-minutes:
        description: "Timeout for the smoke-test job (distinct from build-test's timeout-minutes)."
        type: number
        default: 3

      coverage-threshold:
        description: "Minimum total coverage percentage. Enforced after `go test` via coverage.out. Set to 0 to disable."
        type: number
        default: 80.0

      enable-integration-tests:
        description: >-
          Run integration tests as a separate job. Uses the build tags declared in
          `integration-build-tags`. Reports coverage to Codecov under the
          `integration` flag. Docker daemon is available on ubuntu-latest runners,
          so testcontainers-based suites work out of the box.
        type: boolean
        default: false
      integration-build-tags:
        description: "Go build tag(s) that gate integration tests (passed to `-tags`)."
        type: string
        default: "integration"
      integration-test-packages:
        description: "Packages to run integration tests against."
        type: string
        default: "./..."
      integration-timeout-minutes:
        description: "Timeout for the integration-tests job."
        type: number
        default: 20

      enable-e2e-tests:
        description: >-
          Run end-to-end tests as a separate job. Uses the build tags declared in
          `e2e-build-tags`. Reports coverage to Codecov under the `e2e` flag.
        type: boolean
        default: false
      e2e-build-tags:
        description: "Go build tag(s) that gate e2e tests (passed to `-tags`)."
        type: string
        default: "e2e"
      e2e-test-packages:
        description: "Packages to run e2e tests against."
        type: string
        default: "./..."
      e2e-timeout-minutes:
        description: "Timeout for the e2e-tests job."
        type: number
        default: 30

      enable-fuzz:
        description: "Run `go test -run=Fuzz` against the repo (fuzz tests in corpus-replay mode). No-op when no FuzzXxx targets exist."
        type: boolean
        default: true
      enable-license-check:
        description: "Scan dependency licenses via google/go-licenses against the org-standard allowlist."
        type: boolean
        default: true
      license-allowlist:
        description: "Comma-separated SPDX identifiers that replace the built-in org allowlist when non-empty."
        type: string
        default: ""
      license-allowlist-extra:
        description: "Comma-separated SPDX identifiers added on top of the org allowlist."
        type: string
        default: ""
      license-ignore:
        description: "Comma-separated Go import paths to exclude from license check."
        type: string
        default: ""

    secrets:
      CODECOV_TOKEN:
        description: "Codecov upload token (only needed when enable-codecov=true)."
        required: false

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    if: ${{ inputs.enable-build-test }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          # Strict mode: surface caller script errors instead of silently
          # continuing into the Go build with a half-built frontend.
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: Download Go modules
        run: go mod download

      - name: go vet
        env:
          BUILD_TARGET: ${{ inputs.build-target }}
        run: go vet "$BUILD_TARGET"

      - name: go build
        env:
          BUILD_TARGET: ${{ inputs.build-target }}
        run: go build -v "$BUILD_TARGET"

      - name: go test
        env:
          TEST_FLAGS: ${{ inputs.test-flags }}
          TEST_PACKAGES: ${{ inputs.test-packages }}
        run: |
          # shellcheck disable=SC2086  # TEST_FLAGS is a space-separated flag list by design
          go test -v $TEST_FLAGS "$TEST_PACKAGES"

      - name: Enforce coverage threshold
        if: ${{ inputs.enable-build-test && hashFiles('coverage.out') != '' }}
        env:
          THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          set -euo pipefail
          if [ "${THRESHOLD:-0}" = "0" ] || [ "${THRESHOLD:-0}" = "0.0" ]; then
            echo "coverage-threshold=0 — enforcement disabled."
            exit 0
          fi
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage: ${TOTAL}% (threshold ${THRESHOLD}%)"
          awk -v t="$THRESHOLD" -v a="$TOTAL" 'BEGIN { if (a+0 < t+0) { printf "::error::Coverage %s%% is below threshold %s%%\n", a, t; exit 1 } }'

      - name: Upload coverage to Codecov
        if: ${{ inputs.enable-codecov }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.codecov-file }}
          flags: ${{ inputs.codecov-flags }}
          fail_ci_if_error: false

  golangci-lint:
    name: golangci-lint
    if: ${{ inputs.enable-golangci-lint }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          # Strict mode: surface caller script errors instead of silently
          # continuing into the Go build with a half-built frontend.
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: ${{ inputs.golangci-lint-args }}
          # `goinstall` builds golangci-lint with the caller's Go toolchain,
          # avoiding binary/repo Go-version mismatches when the repo targets
          # a newer Go than the latest prebuilt binary.
          install-mode: ${{ inputs.golangci-lint-install-mode }}
          verify: ${{ inputs.golangci-lint-verify }}

  govulncheck:
    name: govulncheck
    if: ${{ inputs.enable-govulncheck }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          # Strict mode: surface caller script errors instead of silently
          # continuing into the Go build with a half-built frontend.
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: Run govulncheck
        env:
          VULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
          STRICT: ${{ inputs.govulncheck-strict }}
        # govulncheck's exit code is the source of truth (0 = clean, 3 =
        # vulns). When `govulncheck-strict: false` (default), findings log
        # but don't break CI — keeps the migration story clean while Go
        # stdlib upgrades land separately. Flip to true once the repo's on
        # a patched toolchain.
        run: |
          set +e
          go run "golang.org/x/vuln/cmd/govulncheck@${VULNCHECK_VERSION}" ./...
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "govulncheck: no vulnerabilities found."
            exit 0
          fi
          if [ "$STRICT" = "true" ]; then
            echo "::error::govulncheck reported vulnerabilities (exit $STATUS) — failing because govulncheck-strict=true."
            exit "$STATUS"
          fi
          echo "::warning::govulncheck reported vulnerabilities (exit $STATUS). Non-blocking because govulncheck-strict=false; track as follow-up."

  gosec:
    name: gosec
    if: ${{ inputs.enable-gosec }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          # Strict mode: surface caller script errors instead of silently
          # continuing into the Go build with a half-built frontend.
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: Run gosec
        uses: securego/gosec@c864f68365f29c18b09b66880c76bf74af403aba # master
        with:
          # `-no-fail` keeps the CI step green; findings flow into the
          # Security tab via the SARIF upload below. Treat code scanning
          # (not workflow-log grep) as the source of truth for gosec.
          args: "-no-fail -fmt sarif -out gosec-results.sarif ./..."

      - name: Upload gosec SARIF
        if: always() && hashFiles('gosec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: gosec-results.sarif

  smoke-test:
    name: Smoke Tests (fast feedback)
    if: ${{ inputs.enable-smoke-fast-feedback && inputs.enable-build-test }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.smoke-timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          # Strict mode: surface caller script errors instead of silently
          # continuing into the Go build with a half-built frontend.
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: go test -short (smoke)
        env:
          TEST_PACKAGES: ${{ inputs.test-packages }}
        run: go test -short -count=1 -timeout=2m "$TEST_PACKAGES"

  fuzz:
    name: Fuzz (corpus replay)
    if: ${{ inputs.enable-fuzz }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          # Strict mode: surface caller script errors instead of silently
          # continuing into the Go build with a half-built frontend.
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: Run fuzz tests (corpus replay mode)
        # `-run=Fuzz` + no `-fuzz=` runs FuzzXxx functions as unit tests against
        # their existing corpus without actively generating new inputs. Fast,
        # safe to always enable; no-op when repo has no FuzzXxx targets.
        env:
          TEST_PACKAGES: ${{ inputs.test-packages }}
        run: go test -run='^Fuzz' -count=1 -timeout=5m "$TEST_PACKAGES"

  license-check:
    name: License Scan
    if: ${{ inputs.enable-license-check }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@5348b744d0983d85713295ea08a20cca1654a45e  # pinned to v1.6.0 (post-v1 tags live in /v2 module path)

      - name: Run license check
        env:
          ALLOWLIST_OVERRIDE: ${{ inputs.license-allowlist }}
          ALLOWLIST_EXTRA: ${{ inputs.license-allowlist-extra }}
          IGNORE_PATHS: ${{ inputs.license-ignore }}
        run: |
          set -euo pipefail
          # Org-standard allowlist. Permissive licenses commonly found in the
          # Go ecosystem. Callers override with `license-allowlist` (replace)
          # or extend with `license-allowlist-extra` (append).
          DEFAULT_ALLOW="Apache-2.0,Apache-2.0 WITH LLVM-exception,BSD-2-Clause,BSD-3-Clause,BSD-3-Clause-Clear,BlueOak-1.0.0,CC-BY-4.0,CC0-1.0,ISC,MIT,MIT-0,MPL-2.0,Unlicense,0BSD"
          if [ -n "$ALLOWLIST_OVERRIDE" ]; then
            ALLOW="$ALLOWLIST_OVERRIDE"
          else
            ALLOW="$DEFAULT_ALLOW"
          fi
          if [ -n "$ALLOWLIST_EXTRA" ]; then
            ALLOW="$ALLOW,$ALLOWLIST_EXTRA"
          fi
          # Build the --ignore arg list
          IGNORE_ARGS=""
          if [ -n "$IGNORE_PATHS" ]; then
            # shellcheck disable=SC2001
            for p in $(echo "$IGNORE_PATHS" | sed 's/,/ /g'); do
              IGNORE_ARGS="$IGNORE_ARGS --ignore=$p"
            done
          fi
          echo "Allowed licenses: $ALLOW"
          # shellcheck disable=SC2086
          go-licenses check ./... --allowed_licenses="$ALLOW" $IGNORE_ARGS

  integration-tests:
    name: Integration Tests
    if: ${{ inputs.enable-integration-tests }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.integration-timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: Go integration tests
        env:
          BUILD_TAGS: ${{ inputs.integration-build-tags }}
          TEST_PACKAGES: ${{ inputs.integration-test-packages }}
        run: |
          go test -race -tags="$BUILD_TAGS" \
            -coverprofile=coverage-integration.out \
            -covermode=atomic \
            -timeout=15m \
            "$TEST_PACKAGES"

      - name: Upload integration coverage to Codecov
        if: ${{ inputs.enable-codecov && hashFiles('coverage-integration.out') != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-integration.out
          flags: integration
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    if: ${{ inputs.enable-e2e-tests }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.e2e-timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Set up Bun
        if: ${{ inputs.setup-bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Pre-build command
        if: ${{ inputs.pre-build-cmd != '' }}
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-cmd }}
        run: |
          bash -euo pipefail -c "$PRE_BUILD_CMD"

      - name: Go e2e tests
        env:
          BUILD_TAGS: ${{ inputs.e2e-build-tags }}
          TEST_PACKAGES: ${{ inputs.e2e-test-packages }}
        run: |
          go test -race -tags="$BUILD_TAGS" \
            -coverprofile=coverage-e2e.out \
            -covermode=atomic \
            -timeout=25m \
            "$TEST_PACKAGES"

      - name: Upload e2e coverage to Codecov
        if: ${{ inputs.enable-codecov && hashFiles('coverage-e2e.out') != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-e2e.out
          flags: e2e
          fail_ci_if_error: false
