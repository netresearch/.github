name: PR Quality Gates

on:
  workflow_call:
    inputs:
      size-warning-threshold:
        description: 'Lines changed threshold for medium size label'
        required: false
        type: number
        default: 500
      size-alert-threshold:
        description: 'Lines changed threshold for large size warning'
        required: false
        type: number
        default: 1000
      security-controls-path:
        description: 'Path to security controls documentation'
        required: false
        type: string
        default: '.github/SECURITY_CONTROLS.md'

      auto-approve-maintainers:
        description: >-
          When true, automatically approve PRs whose author_association is
          OWNER / MEMBER / COLLABORATOR (i.e. project maintainers). Satisfies
          the "1 approval" branch-protection gate for maintainer PRs without
          bypassing Copilot review (which runs separately via the Copilot
          ruleset, not this workflow).
        required: false
        type: boolean
        default: true

      auto-approve-message:
        description: >-
          Body text posted with the auto-approval review. Supports standard
          Markdown. Placeholder `{controls}` is replaced with a link to
          security-controls-path.
        required: false
        type: string
        default: "**Automated approval for maintainer PR**\n\nAll automated quality gates passed. See [SECURITY_CONTROLS.md]({controls}) for compensating controls."

permissions: {}

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: PR Size Check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SIZE_WARNING: ${{ inputs.size-warning-threshold }}
          SIZE_ALERT: ${{ inputs.size-alert-threshold }}
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const total = additions + deletions;

            const warning = parseInt(process.env.SIZE_WARNING);
            const alert = parseInt(process.env.SIZE_ALERT);

            let size = 'small';
            if (total > warning) size = 'large';
            else if (total > Math.floor(warning / 2.5)) size = 'medium';

            console.log(`PR Size: ${size} (${additions}+ / ${deletions}-)`);

            if (total > alert) {
              core.warning(`Large PR with ${total} changes. Consider breaking into smaller PRs.`);
            }

  auto-approve:
    name: Auto-Approve (Solo Maintainer)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality-gate
    # Skip (not fail) for fork PRs — auto-approve only applies to same-repo
    # branches. Fork PRs always fail because GITHUB_TOKEN lacks permission.
    if: >-
      inputs.auto-approve-maintainers
      && github.event.pull_request.draft == false
      && github.event.pull_request.head.repo.full_name == github.repository
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Auto-approve PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CONTROLS_PATH: ${{ inputs.security-controls-path }}
          APPROVE_MESSAGE: ${{ inputs.auto-approve-message }}
        with:
          script: |
            const controlsPath = process.env.CONTROLS_PATH;
            const message = process.env.APPROVE_MESSAGE.replace(/\\n/g, "\n").replace(/\{controls\}/g, `/${controlsPath}`);
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: message,
            });
            console.log('PR auto-approved');
