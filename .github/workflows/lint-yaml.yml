# Reusable "Lint YAML" — runs yamllint over the caller's repository.
#
# The yamllint config is the same inline defaults previously used by this
# repo's `ci.yml`:
#   extends: default
#   rules:
#     line-length: disable
#     truthy: disable
#     document-start: disable
#
# If the caller repo ships its own `.yamllint`, `.yamllint.yml`, or
# `.yamllint.yaml`, that file is used instead (yamllint auto-discovers it
# in the working directory, taking precedence over the `-d` default).
#
# Caller pattern:
#
#   jobs:
#     yaml:
#       uses: netresearch/.github/.github/workflows/lint-yaml.yml@main
#
# SECURITY: pinned action SHAs, harden-runner, read-only permissions,
# `persist-credentials: false` on checkout.

name: Lint YAML (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Per-job timeout in minutes."
        type: number
        default: 5
      strict:
        description: "Fail the job when yamllint reports findings. Default false — findings are logged but don't block CI (lets repos migrate first, clean up in follow-ups)."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: yamllint
        env:
          # Relaxed defaults tuned for GitHub Actions YAML:
          #   - braces/brackets: allow up to 1 space inside (matches idiomatic
          #     `{ contents: read }` and `[main]` patterns).
          #   - line-length / truthy / document-start: disabled — noisy for
          #     workflow files that don't ship `---` or `true` literals.
          #   - comments: {min-spaces-from-content: 1} — many GHA comments
          #     use `# ...` with 1 space (yamllint default requires 2).
          YAMLLINT_DEFAULT_CONFIG: "{extends: default, rules: {line-length: disable, truthy: disable, document-start: disable, braces: {min-spaces-inside: 0, max-spaces-inside: 1}, brackets: {min-spaces-inside: 0, max-spaces-inside: 1}, comments: {min-spaces-from-content: 1}, comments-indentation: disable}}"
          STRICT: ${{ inputs.strict }}
        run: |
          pip install --quiet yamllint
          set +e
          # If the caller repo has its own yamllint config file, prefer it;
          # otherwise fall back to our inline defaults.
          if [ -f .yamllint ] || [ -f .yamllint.yml ] || [ -f .yamllint.yaml ]; then
            yamllint .
          else
            yamllint -d "$YAMLLINT_DEFAULT_CONFIG" .
          fi
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then exit 0; fi
          if [ "$STRICT" = "true" ]; then
            echo "::error::yamllint reported findings — failing because strict=true."
            exit "$STATUS"
          fi
          echo "::warning::yamllint reported findings. Non-blocking because strict=false; ship a .yamllint with tightened rules or set strict=true after cleanup."
