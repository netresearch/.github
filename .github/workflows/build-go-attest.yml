name: Build Go Binary with Provenance Attestation

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Output binary name (e.g., myapp-linux-amd64)"
        required: true
        type: string
      goos:
        description: "Target OS (GOOS)"
        required: true
        type: string
      goarch:
        description: "Target architecture (GOARCH)"
        required: true
        type: string
      goarm:
        description: "ARM version (GOARM) - only for goarch=arm"
        required: false
        type: string
        default: ""
      cgo-enabled:
        description: "Enable CGO (0=disabled, 1=enabled)"
        required: false
        type: string
        default: "0"
      go-version-file:
        description: "Path to go.mod or .go-version for Go version detection"
        required: false
        type: string
        default: "go.mod"
      main-package:
        description: >-
          Go main package path. Set to `auto` to resolve after checkout
          by scanning for a `package main` declaration:
            1. If any `./*.go` file declares `package main` → use `.`
               (picks up repos whose entrypoint uses a non-`main.go`
               filename — e.g. ofelia.go, cmd.go).
            2. Else if `./cmd/<repo-name>/*.go` declares `package main`
               → use `./cmd/<repo-name>`.
            3. Else fail with a clear message.
          Accepts any explicit path (e.g. `./cmd/cli`) to bypass the
          auto-detection.
        required: false
        type: string
        default: "."
      ldflags:
        description: "Linker flags (-ldflags value)"
        required: false
        type: string
        default: "-s -w"
      release-tag:
        description: "Release tag for uploading the binary as a release asset"
        required: false
        type: string
        default: ""
      upload-to-release:
        description: "Upload binary to GitHub release (requires release-tag)"
        required: false
        type: boolean
        default: true
      sbom:
        description: "Generate Syft SBOM for the built binary (format controlled by sbom-format). When upload-to-release is true and release-tag is set, the SBOM is also uploaded to the release."
        required: false
        type: boolean
        default: false
      sbom-format:
        description: "SBOM format passed to anchore/sbom-action ('spdx-json' or 'cyclonedx-json'). Default 'spdx-json'."
        required: false
        type: string
        default: "spdx-json"
      ref:
        description: "Git ref to check out. Defaults to the caller's github.ref."
        required: false
        type: string
        default: ""
      setup-bun:
        description: "Install Bun before running pre-build-command. Set true for projects that embed assets built via Bun (Tailwind, TS bundler, etc.)."
        required: false
        type: boolean
        default: false
      setup-node:
        description: "Install Node.js before running pre-build-command."
        required: false
        type: boolean
        default: false
      node-version:
        description: "Node.js version (when setup-node=true)."
        required: false
        type: string
        default: "lts/*"
      bun-version:
        description: "Bun version (when setup-bun=true). Pin to a specific version for reproducible builds."
        required: false
        type: string
        default: "latest"
      pre-build-command:
        description: "Shell command(s) run after checkout/toolchain setup and before `go build`. Useful for generating embedded assets (bun run build:assets, templ generate, sqlc generate, etc.)."
        required: false
        type: string
        default: ""
      auto-build-timestamp:
        description: >-
          When true, resolve the HEAD commit timestamp (ISO-8601, via
          `git show -s --format=%cI`) after checkout and append
          `-X main.buildTime=<value>` to ldflags. Works for every
          trigger — including `workflow_dispatch` backfills where
          `github.event.head_commit` is absent — because the timestamp
          comes from the checked-out git tree, not the event payload.
          The step FAILS if resolution yields an empty value, so opting
          in guarantees a populated timestamp.
          The consumer's main package MUST declare `var buildTime
          string` for the appended ldflag to land. Go 1.21+ linkers
          silently ignore `-X` targets for missing vars, but older
          toolchains can reject the build with 'symbol not found',
          so declaring the var is part of the contract for this input.
        required: false
        type: boolean
        default: false

# CALLER REQUIREMENTS
# ===================
# When calling this reusable workflow, the caller's job-level
# `permissions:` block MUST grant at least this full set (the job
# requests `contents: write` unconditionally for release-asset
# uploads). Otherwise push-event runs fail with `startup_failure`
# before any job runs — GitHub rejects the workflow at startup when
# the reusable declares permissions the caller hasn't granted.
#
#   jobs:
#     build:
#       uses: netresearch/.github/.github/workflows/build-go-attest.yml@main
#       permissions:
#         contents: write        # required for release asset upload
#         id-token: write        # required for provenance attestation
#         attestations: write    # required for provenance attestation
#       with:
#         binary-name: my-app-linux-amd64
#         goos: linux
#         goarch: amd64
permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: Build and Attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Set up Node.js
        if: inputs.setup-node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Set up Bun
        if: inputs.setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Run pre-build command
        if: inputs.pre-build-command != ''
        env:
          PRE_BUILD_CMD: ${{ inputs.pre-build-command }}
        run: |
          set -euo pipefail
          echo "::group::pre-build-command"
          # Invoke bash with strict flags so pipeline failures and
          # unset-variable references inside the pre-build command
          # propagate rather than being silently swallowed.
          bash -euo pipefail -c "$PRE_BUILD_CMD"
          echo "::endgroup::"

      - name: Build binary
        env:
          CGO_ENABLED: ${{ inputs.cgo-enabled }}
          GOOS: ${{ inputs.goos }}
          GOARCH: ${{ inputs.goarch }}
          BINARY_NAME: ${{ inputs.binary-name }}
          LDFLAGS: ${{ inputs.ldflags }}
          MAIN_PACKAGE: ${{ inputs.main-package }}
          INPUT_GOARM: ${{ inputs.goarm }}
          AUTO_BUILD_TIMESTAMP: ${{ inputs.auto-build-timestamp }}
        run: |
          set -euo pipefail

          # Resolve HEAD commit's ISO-8601 timestamp into an appended
          # `-X main.buildTime=<value>` ldflag when the caller opted in.
          # Works on every trigger because it reads git directly instead
          # of `github.event.head_commit.timestamp` (empty on
          # workflow_dispatch backfills).
          # The consumer's main package must declare `var buildTime
          # string` to receive the value (see input docs). The step
          # fails hard if resolution yields an empty string so opting in
          # can't silently ship a binary with an empty buildTime.
          if [[ "${AUTO_BUILD_TIMESTAMP}" == "true" ]]; then
            # Capture both success/failure explicitly — `set -e` would
            # otherwise abort on a non-zero `git show` before the custom
            # diagnostic runs. The empty-string check still fires for
            # exit-0-empty-output edge cases.
            if ! BUILD_TS=$(git show -s --format=%cI HEAD 2>&1); then
              echo "::error::auto-build-timestamp=true but 'git show -s --format=%cI HEAD' failed: ${BUILD_TS}. Check that actions/checkout completed and HEAD points at a real commit."
              exit 1
            fi
            if [[ -z "${BUILD_TS}" ]]; then
              echo "::error::auto-build-timestamp=true but 'git show -s --format=%cI HEAD' returned empty. Check that actions/checkout produced a valid HEAD (fetch-depth 0 or >=1 both work)."
              exit 1
            fi
            LDFLAGS="${LDFLAGS} -X main.buildTime=${BUILD_TS}"
            echo "auto-build-timestamp: appended -X main.buildTime=${BUILD_TS}"
          fi

          # Resolve `main-package: auto` against the checked-out tree.
          # Locates a `package main` declaration in any non-test *.go
          # file so non-`main.go` entrypoints (e.g. ofelia.go) work too.
          if [[ "${MAIN_PACKAGE}" == "auto" ]]; then
            # GITHUB_REPOSITORY is always populated (event-independent);
            # github.event.repository.name is empty on some triggers.
            REPO_NAME="${GITHUB_REPOSITORY##*/}"

            # has_main <dir> — succeeds iff <dir>/*.go (excluding *_test.go)
            # contains a `package main` declaration. `-print -quit` makes
            # find exit after the first match so large repos don't scan
            # every file in the directory just to answer an existence
            # question. The command-substitution capture (no pipe reader)
            # avoids any SIGPIPE interaction with `set -o pipefail`.
            has_main() {
              local dir="$1"
              local match
              match=$(find "$dir" -maxdepth 1 -type f -name '*.go' ! -name '*_test.go' \
                -exec grep -qE '^package main([[:space:]]|$)' {} \; -print -quit 2>/dev/null)
              [[ -n "$match" ]]
            }

            if has_main .; then
              MAIN_PACKAGE="."
            elif [[ -d "./cmd/${REPO_NAME}" ]] && has_main "./cmd/${REPO_NAME}"; then
              MAIN_PACKAGE="./cmd/${REPO_NAME}"
            else
              echo "::error::main-package=auto: no non-test '.go' file declaring 'package main' at repo root or in ./cmd/${REPO_NAME}/. Set main-package explicitly."
              exit 1
            fi
            echo "main-package auto-detected as ${MAIN_PACKAGE}"
          fi

          # Only set GOARM when building for ARM architecture
          if [[ "${GOARCH}" == "arm" ]]; then
            if [[ -z "${INPUT_GOARM}" ]]; then
              echo "::error::GOARM is required when GOARCH=arm"
              exit 1
            fi
            export GOARM="${INPUT_GOARM}"
          fi

          # Append .exe for Windows targets
          OUTPUT="${BINARY_NAME}"
          if [[ "${GOOS}" == "windows" ]]; then
            OUTPUT="${BINARY_NAME}.exe"
          fi

          go build -trimpath \
            -ldflags="${LDFLAGS}" \
            -o "${OUTPUT}" \
            "${MAIN_PACKAGE}"

          # Export actual filename for subsequent steps
          echo "BINARY=${OUTPUT}" >> "$GITHUB_ENV"

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.BINARY }}

      - name: Resolve SBOM filename
        if: inputs.sbom
        id: sbom-name
        env:
          BINARY: ${{ env.BINARY }}
          SBOM_FORMAT: ${{ inputs.sbom-format }}
        run: |
          set -euo pipefail
          case "$SBOM_FORMAT" in
            spdx-json)       EXT="spdx.json" ;;
            cyclonedx-json)  EXT="cdx.json" ;;
            *) echo "::error::unsupported sbom-format '$SBOM_FORMAT' (expected: spdx-json|cyclonedx-json)"; exit 1 ;;
          esac
          echo "file=${BINARY}.${EXT}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (Syft)
        if: inputs.sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ env.BINARY }}
          format: ${{ inputs.sbom-format }}
          output-file: ${{ steps.sbom-name.outputs.file }}
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM
        if: inputs.sbom
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.sbom-name.outputs.file }}

      - name: Upload binary to release
        if: inputs.upload-to-release && inputs.release-tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          gh release upload "$RELEASE_TAG" "$BINARY" --clobber

      - name: Upload SBOM to release
        if: inputs.sbom && inputs.upload-to-release && inputs.release-tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          SBOM_FILE: ${{ steps.sbom-name.outputs.file }}
        run: |
          gh release upload "$RELEASE_TAG" "$SBOM_FILE" --clobber
