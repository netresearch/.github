# Reusable "Lint Markdown" — runs markdownlint-cli2 over the caller's
# Markdown files.
#
# Caller pattern:
#
#   jobs:
#     markdown:
#       uses: netresearch/.github/.github/workflows/lint-markdown.yml@main
#       with:
#         globs: "**/*.md"
#
# SECURITY: pinned action SHAs, harden-runner, read-only permissions,
# `persist-credentials: false` on checkout. The `globs` input is forwarded
# to the action's own `globs` parameter (not into a `run:` step), so it
# does not need `env:` hardening.

name: Lint Markdown (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner label."
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Per-job timeout in minutes."
        type: number
        default: 5
      globs:
        description: "Glob(s) of Markdown files to lint (passed to markdownlint-cli2-action)."
        type: string
        default: "**/*.md"
      strict:
        description: "Fail the job when markdownlint reports findings. Default false — findings are logged but don't block CI (lets repos migrate first, clean up in follow-ups)."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Write default markdownlint config (only if caller has none)
        # markdownlint-cli2 auto-discovers .markdownlint-cli2.{jsonc,yaml,cjs}
        # and .markdownlint.{jsonc,yaml,yml} in repo root. Drop an opinionated
        # default only when the caller hasn't shipped one, so callers can
        # override by committing their own config file.
        run: |
          if [ -f .markdownlint-cli2.jsonc ] || [ -f .markdownlint-cli2.yaml ] || \
             [ -f .markdownlint-cli2.cjs ] || [ -f .markdownlint.jsonc ] || \
             [ -f .markdownlint.yaml ] || [ -f .markdownlint.yml ]; then
            echo "Caller config found, using it."
            exit 0
          fi
          cat > .markdownlint.yaml <<'YAML'
          # Org default — tune here or override by committing your own.
          default: true
          # MD013 line-length: noisy for prose in READMEs; repos can re-enable locally.
          MD013: false
          # MD034 bare URLs: common in our release notes / PR bodies.
          MD034: false
          # MD041 first-line-heading: breaks for index pages that start with a frontmatter or image.
          MD041: false
          YAML

      - name: markdownlint
        id: markdownlint
        # `continue-on-error` keeps the step's failure from failing the job
        # when strict=false. The "Summary" step below emits a warning in
        # that case so the finding is still visible.
        continue-on-error: ${{ !inputs.strict }}
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: ${{ inputs.globs }}

      - name: Summary (non-strict mode)
        if: ${{ !inputs.strict && steps.markdownlint.outcome == 'failure' }}
        run: |
          echo "::warning::markdownlint reported findings. Non-blocking because strict=false; ship a .markdownlint.yaml with tightened rules or set strict=true after cleanup."
